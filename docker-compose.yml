##############################################################################
# Assistant documentaire Lite RAG - Orchestration des services
#
# Services :
#   - minio        : stockage objet du document brut (S3-compatible)
#   - createbucket : job one-shot qui cree le bucket au demarrage
#   - chromadb     : base vectorielle (stockage des embeddings)
#   - ollama       : serveur LLM local (qwen2.5:0.5b)
#   - ollama-pull  : job one-shot qui telecharge le modele
#   - backend      : API FastAPI (chaine RAG : upload / index / ask)
#   - frontend     : interface Streamlit
#
# Lancement :   docker compose up --build
# Interface :   http://localhost:8501   (Streamlit)
# API docs  :   http://localhost:8000/docs   (FastAPI)
# Console MinIO: http://localhost:9001
##############################################################################

services:

  # --------------------------------------------------------------------------
  # Stockage objet du document brut (S3-compatible)
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-net

  # Job one-shot : cree le bucket cible s'il n'existe pas
  createbucket:
    image: minio/mc:latest
    container_name: rag-createbucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-documents};
      echo 'Bucket ${MINIO_BUCKET:-documents} pret';
      "
    networks:
      - rag-net

  # --------------------------------------------------------------------------
  # Base vectorielle
  # --------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: rag-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    networks:
      - rag-net

  # --------------------------------------------------------------------------
  # Serveur LLM local
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag-net

  # Job one-shot : telecharge le modele leger recommande
  ollama-pull:
    image: ollama/ollama:latest
    container_name: rag-ollama-pull
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      /bin/sh -c "
      echo 'Attente du serveur Ollama...';
      until ollama list >/dev/null 2>&1; do sleep 2; done;
      ollama pull ${OLLAMA_MODEL:-qwen2.5:0.5b};
      echo 'Modele ${OLLAMA_MODEL:-qwen2.5:0.5b} disponible';
      "
    networks:
      - rag-net

  # --------------------------------------------------------------------------
  # Backend API (FastAPI + LangChain)
  # --------------------------------------------------------------------------
  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      MINIO_SECURE: "false"
      # ChromaDB
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-rag_documents}
      # Ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:0.5b}
      # Embeddings
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      # Parametres RAG
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
      TOP_K: ${TOP_K:-4}
    volumes:
      - ./data:/app/data:ro
      - hf_cache:/root/.cache/huggingface
    depends_on:
      minio:
        condition: service_healthy
      chromadb:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - rag-net

  # --------------------------------------------------------------------------
  # Frontend (Streamlit)
  # --------------------------------------------------------------------------
  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - rag-net

volumes:
  minio_data:
  chroma_data:
  ollama_data:
  hf_cache:

networks:
  rag-net:
    driver: bridge
