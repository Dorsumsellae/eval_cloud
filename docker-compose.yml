##############################################################################
# Assistant documentaire Lite RAG - Orchestration des services
#
# Services :
#   - minio        : stockage objet du document brut (S3-compatible)
#   - createbucket : job one-shot qui cree le bucket au demarrage
#   - chromadb     : base vectorielle (stockage des embeddings)
#   - postgres     : base applicative (notebooks, conversations, notes)
#   - ollama       : serveur LLM local (qwen2.5:0.5b)
#   - ollama-pull  : job one-shot qui telecharge le modele
#   - backend      : API FastAPI (chaine RAG : upload / index / ask / chat)
#   - frontend     : interface Next.js (facon NotebookLM)
#
# Lancement :   docker compose up --build
# Interface :   http://localhost:3000   (Next.js)
# API docs  :   http://localhost:8000/docs   (FastAPI)
# Console MinIO: http://localhost:9001
##############################################################################

services:

  # --------------------------------------------------------------------------
  # Stockage objet du document brut (S3-compatible)
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-net

  # Job one-shot : cree le bucket cible s'il n'existe pas
  createbucket:
    image: minio/mc:latest
    container_name: rag-createbucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${MINIO_BUCKET:-documents};
      echo 'Bucket ${MINIO_BUCKET:-documents} pret';
      "
    networks:
      - rag-net

  # --------------------------------------------------------------------------
  # Base vectorielle
  # --------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:1.5.9
    container_name: rag-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/data
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    networks:
      - rag-net

  # --------------------------------------------------------------------------
  # Serveur LLM local
  #
  # Par defaut : execution CPU (fonctionne sur toutes les machines).
  # Pour activer un GPU, ajouter le fichier d'override correspondant :
  #   NVIDIA : docker compose -f docker-compose.yml -f docker-compose.nvidia.yml up
  #   AMD    : docker compose -f docker-compose.yml -f docker-compose.amd.yml up  (Linux uniquement)
  # --------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag-net

  # Job one-shot : telecharge le modele leger recommande
  ollama-pull:
    image: ollama/ollama:latest
    container_name: rag-ollama-pull
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: >
      /bin/sh -c "
      echo 'Attente du serveur Ollama...';
      until ollama list >/dev/null 2>&1; do sleep 2; done;
      ollama pull ${OLLAMA_MODEL:-qwen2.5:0.5b};
      echo 'Modele ${OLLAMA_MODEL:-qwen2.5:0.5b} disponible';
      "
    networks:
      - rag-net

  # --------------------------------------------------------------------------
  # Base de donnees applicative (notebooks, conversations, notes)
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rag-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag}
      POSTGRES_DB: ${POSTGRES_DB:-rag}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rag-net

  # --------------------------------------------------------------------------
  # Backend API (FastAPI + LangChain)
  # --------------------------------------------------------------------------
  backend:
    build: ./backend
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      # MinIO
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}
      MINIO_SECURE: "false"
      # ChromaDB
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-rag_documents}
      # Ollama
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:0.5b}
      # Embeddings
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      # Parametres RAG
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
      TOP_K: ${TOP_K:-4}
      DEFAULT_WORKSPACE: ${DEFAULT_WORKSPACE:-default}
      # Base de donnees applicative (notebooks, conversations, notes)
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://rag:rag@postgres:5432/rag}
      # Service ASR (fallback transcription si video sans sous-titres). Vide par
      # defaut : renseigner ASR_SERVICE_URL=http://asr:8100 dans .env ET lancer le
      # profil 'asr' (docker compose --profile asr up) pour l'activer.
      ASR_SERVICE_URL: ${ASR_SERVICE_URL:-}
      ASR_TIMEOUT: ${ASR_TIMEOUT:-900}
    volumes:
      - ./data:/app/data:ro
      - hf_cache:/root/.cache/huggingface
    depends_on:
      minio:
        condition: service_healthy
      chromadb:
        condition: service_started
      ollama:
        condition: service_started
      postgres:
        condition: service_healthy
    networks:
      - rag-net

  # --------------------------------------------------------------------------
  # Service ASR isole (WhisperX + pyannote) : transcription des videos sans
  # sous-titres. Profil 'asr' : ne demarre QUE si demande explicitement, car
  # l'image est lourde (torch/pyannote) et la diarisation exige un HF_TOKEN.
  #   Activation : ASR_SERVICE_URL=http://asr:8100 dans .env, puis
  #                docker compose --profile asr up --build
  # --------------------------------------------------------------------------
  asr:
    build: ./asr
    container_name: rag-asr
    profiles: ["asr"]
    ports:
      - "8100:8100"
    environment:
      ASR_MODEL: ${ASR_MODEL:-small}
      ASR_DEVICE: ${ASR_DEVICE:-cpu}
      ASR_COMPUTE_TYPE: ${ASR_COMPUTE_TYPE:-int8}
      # Jeton Hugging Face pour la diarisation pyannote (modele gated). Sans lui,
      # la transcription est renvoyee sans locuteurs.
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - asr_cache:/root/.cache
    networks:
      - rag-net

  # --------------------------------------------------------------------------
  # Frontend (Next.js, interface facon NotebookLM)
  #
  # NB : l'URL du backend est appelee depuis le NAVIGATEUR (pas le reseau Docker).
  # Elle est inlinee au BUILD (prefixe NEXT_PUBLIC_) -> passee en build arg, et
  # doit pointer vers le port publie du backend : http://localhost:8000.
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    container_name: rag-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - rag-net

volumes:
  minio_data:
  chroma_data:
  ollama_data:
  hf_cache:
  pg_data:     # donnees Postgres (notebooks, conversations, notes)
  asr_cache:   # cache des modeles Whisper/pyannote du service ASR

networks:
  rag-net:
    driver: bridge
