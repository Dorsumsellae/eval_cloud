name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances (subset léger pour la CI)
        run: pip install -r requirements-ci.txt

      - name: Lancer les tests unitaires
        run: pytest tests/ -v

      - name: Vérifier que le backend s'importe correctement
        run: python -c "from backend.main import app; print('Import backend OK')"
