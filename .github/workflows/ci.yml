name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code (avec sous-modules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances du backend
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lancer les tests unitaires du backend
        working-directory: backend
        run: pytest -v

      - name: Vérifier que le backend s'importe correctement
        working-directory: backend
        run: python -c "from main import app; print('Import backend OK')"
        